version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: gigi-mysql
    restart: always
    environment:
      MYSQL_DATABASE: gigi
      MYSQL_USER: gigi
      MYSQL_PASSWORD: cecilia
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: